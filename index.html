<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산유 중고 문구 Since 2026</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
        .category { margin-top: 20px; }
        .product { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .sold-out { color: red; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <h1>찾아가는 서비스 주문하기</h1>
    <form id="orderForm" action="https://formspree.io/f/xykqkjdq" method="POST">
        <label>학년/반/번호: </label>
        <input type="text" name="student_info" placeholder="예: 20912" required style="width:100%; padding: 8px; margin-bottom: 20px;">
        
        <div id="productList"></div>
        
        <button type="submit">주문 완료하기</button>
    </form>

    <script>
        const products = [
            // 문구류
            {          { cat: '전기용품', name: 'R5W 백열전구', stock: 5, price: 300 },
            { cat: '전기용품', name: '9V 배터리', stock: 0, price: 400 },
            { cat: '전기용품', name: '1.5V 배터리', stock: 5, price: 300 },
            { cat: '전기용품', name: '미니 전선가위', stock: 1, price: 400 },
            // 화학물질
            { cat: '화학물질', name: '소량의 화약', stock: 1, price: 200 },
            { cat: '화학물질', name: '과탄산소다 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '구연산 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '베이킹소다 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '설탕 100g', stock: 5, price: 200 }
            //기타
            { cat:cat: '문구류', name: '연필', stock: 4, price: 100 },
            { cat: '문구류', name: '지우개', stock: 3, price: 150 },
            { cat: '문구류', name: '네임펜', stock: 2, price: 200 },
            { cat: '문구류', name: '붓펜', stock: 1, price: 200 },
            { cat: '문구류', name: '스테이플러', stock: 1, price: 400 },
            { cat: '문구류', name: '펀칭기', stock: 1, price: 400 },
            { cat: '문구류', name: '삼각필통', stock: 2, price: 500 },
            // 전기용품
            { cat: '전기용품', name: 'P21W 백열전구', stock: 0, price: 300},
        ];

        const listDiv = document.getElementById('productList');

        // 화면에 상품 목록을 그려주는 함수 (재사용을 위해 분리)
        function renderProducts() {
            listDiv.innerHTML = ''; // 기존 목록 초기화
            let currentCategory = '';

            products.forEach((p) => {
                if (p.cat !== currentCategory) {
                    currentCategory = p.cat;
                    listDiv.innerHTML += `<h3>${currentCategory}</h3>`;
                }
                
                const isSoldOut = p.stock <= 0;
                listDiv.innerHTML += `
                    <div class="product">
                        <label>
                            <input type="checkbox" name="order" value="${p.name}" ${isSoldOut ? 'disabled' : ''}>
                            ${p.name} (가격: ${p.price}원)
                        </label>
                        <span>${isSoldOut ? '<span class="sold-out">품절</span>' : '재고: ' + p.stock}</span>
                    </div>
                `;
            });
        }

        // 초기 화면 렌더링
        renderProducts();

        // 폼 제출 이벤트 제어
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            // 체크된 체크박스들을 모두 가져옴
            const checkedBoxes = document.querySelectorAll('input[name="order"]:checked');
            
            if (checkedBoxes.length === 0) {
                alert('하나 이상의 상품을 선택해주세요.');
                e.preventDefault(); // 상품 선택 안 하면 제출 막기
                return;
            }

            // 선택된 상품의 재고를 1씩 감소시킴
            checkedBoxes.forEach(box => {
                const productName = box.value;
                const product = products.find(p => p.name === productName);
                if (product && product.stock > 0) {
                    product.stock -= 1;
                }
            });

            // 재고가 줄어든 상태로 화면을 갱신
            renderProducts();

            // 주의: Formspree로 페이지가 넘어가기 전 잠시 재고가 줄어든 것을 보여주기 위함입니다.
            // Formspree 전송 후 돌아오면(새로고침되면) 원래대로 리셋됩니다.
        });
    </script>
</body>
</html>
