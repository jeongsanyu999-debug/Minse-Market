// ... 앞부분 생략 ...
<script>
    const products = [
        // 예시: 재고가 -1이면 입고 준비중이 됩니다.
        { cat: '전기용품', name: '9V 배터리', stock: -1, price: 400 },
        // ... 나머지 상품들 ...
    ];

    const listDiv = document.getElementById('productList');
    let currentCategory = '';

    products.forEach((p) => {
        if (p.cat !== currentCategory) {
            currentCategory = p.cat;
            listDiv.innerHTML += `<h3>${currentCategory}</h3>`;
        }
        
        // 재고가 0 이하이면 무조건 선택 불가
        const isSoldOut = p.stock <= 0;
        
        // 재고가 -1이면 '입고 준비중', 0이면 '품절' 표시
        let statusText = '';
        if (p.stock === -1) {
            statusText = '<span style="color: blue;">입고 준비중</span>';
        } else if (p.stock === 0) {
            statusText = '<span class="sold-out">품절</span>';
        } else {
            statusText = '재고: ' + p.stock + ' <input type="number" name="' + p.name + '" min="0" max="' + p.stock + '" value="0">';
        }

        listDiv.innerHTML += `
            <div class="product">
                <label>${p.name} (${p.price}원)</label>
                <span>${statusText}</span>
            </div>
        `;
    });
</script>
