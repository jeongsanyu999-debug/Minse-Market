<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래너 문구 Since 2026</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        h3 { border-bottom: 2px solid #333; padding-bottom: 5px; margin-top: 25px; }
        .product { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .sold-out { color: red; font-weight: bold; }
        .preparing { color: blue; font-weight: bold; }
        input[type="number"] { width: 50px; }
        textarea { width: 100%; height: 80px; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 15px; background-color: #007bff; color: white; border: none; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>찾아가는 서비스 주문하기</h1>
    <form action="https://formspree.io/f/xykqkjdq" method="POST">
        <label>학년/반/번호: </label>
        <input type="text" name="student_info" placeholder="예: 20912" required style="width:100%; padding: 8px; margin-bottom: 20px;">
        
        <div id="productList"></div>

        <h3>기타 요청사항</h3>
        <textarea name="message" placeholder="포장 요청, 전달 시간, 남기고 싶은 말 등을 적어주세요."></textarea>
        
        <button type="submit">주문 완료하기</button>
    </form>

    <script>
        const products = [
            { cat: '문구류', name: '연필', stock: 5, price: 100 },
            { cat: '문구류', name: '지우개', stock: 3, price: 150 },
            { cat: '문구류', name: '네임펜', stock: 2, price: 200 },
            { cat: '문구류', name: '붓펜', stock: 1, price: 200 },
            { cat: '문구류', name: '스테이플러', stock: 1, price: 400 },
            { cat: '문구류', name: '펀칭기', stock: 1, price: 400 },
            { cat: '문구류', name: '삼각필통', stock: 2, price: 500 },
            { cat: '문구류', name: '형광펜', stock: 4, price: 200 },
            { cat: '전기용품', name: 'P21W 백열전구', stock: 0, price: 300 },
            { cat: '전기용품', name: 'R5W 백열전구', stock: 5, price: 300 },
            { cat: '전기용품', name: '9V 배터리', stock: 0, price: 400 },
            { cat: '전기용품', name: '1.5V 배터리', stock: 5, price: 300 },
            { cat: '전기용품', name: '미니 전선가위', stock: 1, price: 400 },
            { cat: '화학물질', name: '소량의 화약', stock: 1, price: 200 },
            { cat: '화학물질', name: '과탄산소다 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '구연산 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '베이킹소다 100g', stock: 5, price: 200 },
            { cat: '화학물질', name: '설탕 100g', stock: 5, price: 200 },
            { cat: '기타', name: '프리허그', stock: 1000, price: 0 }
        ];

        const listDiv = document.getElementById('productList');
        let currentCategory = '';

        products.forEach((p) => {
            if (p.cat !== currentCategory) {
                currentCategory = p.cat;
                listDiv.innerHTML += `<h3>${currentCategory}</h3>`;
            }
            
            let statusText = '';
            if (p.stock === -1) {
                statusText = '<span class="preparing">입고 준비중</span>';
            } else if (p.stock === 0) {
                statusText = '<span class="sold-out">품절</span>';
            } else {
                statusText = '재고: ' + p.stock + ' <input type="number" name="' + p.name + '" min="0" max="' + p.stock + '" value="0">';
            }

            listDiv.innerHTML += `
                <div class="product">
                    <label>${p.name} (${p.price}원)</label>
                    <span>${statusText}</span>
                </div>
            `;
        });
    </script>
</body>
</html>
